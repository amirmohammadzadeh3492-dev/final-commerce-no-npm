<!doctype html><html lang="fa" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>فروشگاه خریدار</title><link rel="stylesheet" href="styles.css"></head><body><header class="topbar"><div class="container"><h1>فروشگاه خریدار</h1><nav><a href="index.html">خانه</a><a href="store.html">فروشگاه</a><a href="seller.html">پنل فروشنده</a><a href="supplier.html">پنل عمده‌فروش</a></nav></div></header><main class="container"><div class="toolbar"><input id="searchStore" placeholder="جستجوی محصول..."><span id="cartCount" class="badge">0</span><button onclick="openCart()">سبد خرید</button></div><div id="productGrid" class="grid3"></div><div id="cartModal" class="modal hidden"><div class="modal-content"><div class="modal-head"><h3>سبد خرید</h3><button onclick="closeCart()">✕</button></div><div id="cartItems"></div><div class="totals">جمع کل: <span id="cartTotal">0</span></div><button class="primary" onclick="goCheckout()">ادامه و ثبت سفارش</button></div></div><section class="card hidden" id="checkoutSection"><h3>ثبت سفارش</h3><div class="formgrid"><input id="buyerName" placeholder="نام"><input id="buyerPhone" placeholder="شماره"><input id="buyerAddress" placeholder="آدرس"></div><button class="primary" onclick="submitOrder()">ثبت سفارش</button><div id="checkoutMsg"></div></section><section class="card"><h3>پیگیری سفارش</h3><div class="formgrid"><input id="trackCode" placeholder="کد سفارش (مثال: ORD-1001)"><button onclick="trackOrder()">پیگیری</button></div><div id="trackResult"></div></section></main><script src="app.js"></script></body></html>
